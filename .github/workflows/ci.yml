name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
    types: [checks_requested]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest

    outputs:
      rust: ${{ steps.filter.outputs.rust }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Detect Rust Changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            rust:
              - '*.rs'
              - '**/*.rs'
              - 'Cargo.toml'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain'
              - 'rust-toolchain.toml'
              - 'rustfmt.toml'
              - 'clippy.toml'
              - '.cargo/**'

  fmt:
    needs: changes
    if: ${{ always() && !cancelled() && (needs.changes.result == 'failure' || needs.changes.outputs.rust == 'true') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Check Formatting
        run: cargo fmt --all -- --check

  test-and-coverage:
    needs: changes
    if: ${{ always() && !cancelled() && (needs.changes.result == 'failure' || needs.changes.outputs.rust == 'true') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install mold
        run: command -v mold || (sudo apt-get update && sudo apt-get install -y mold)

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          components: llvm-tools-preview

      - name: Install llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Expose Runtime
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Run Tests and Collect Coverage
        run: |
          cargo llvm-cov --locked --no-report nextest --workspace
          cargo llvm-cov report --locked --codecov --output-path codecov.info

      - name: Upload Coverage Data
        if: github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: codecov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: rust

  unused-dependencies:
    needs: changes
    if: ${{ always() && !cancelled() && (needs.changes.result == 'failure' || needs.changes.outputs.rust == 'true') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install mold
        run: command -v mold || (sudo apt-get update && sudo apt-get install -y mold)

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          toolchain: nightly

      - name: Install udeps
        uses: taiki-e/install-action@cargo-udeps

      - name: Check Unused Dependencies
        run: cargo +nightly udeps --locked --all-features --all-targets

  clippy:
    needs: changes
    if: ${{ always() && !cancelled() && (needs.changes.result == 'failure' || needs.changes.outputs.rust == 'true') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: |
          (command -v mold && pkg-config --exists fontconfig) || \
            (sudo apt-get update && sudo apt-get install -y fontconfig libfontconfig1-dev mold)

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          components: clippy

      - name: Run Clippy
        run: cargo clippy --locked --all --all-targets -- -D warnings
