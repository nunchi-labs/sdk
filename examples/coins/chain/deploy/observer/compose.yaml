services:
  coins-chain-indexer:
    image: ${COINS_INDEXER_IMAGE:-nunchi-coins-indexer:latest}
    container_name: coins-chain-indexer
    restart: unless-stopped
    command:
      [
        "--port",
        "8080",
        "--identity",
        "${INDEXER_IDENTITY:?INDEXER_IDENTITY is required}",
        "--participants",
        "${INDEXER_PARTICIPANTS:?INDEXER_PARTICIPANTS is required}",
        "--frontend-dir",
        "/usr/share/nunchi/coins/frontend",
      ]
    volumes:
      - ./frontend:/usr/share/nunchi/coins/frontend:ro
    ports:
      - "${INDEXER_BIND:-0.0.0.0}:${INDEXER_PORT:-8080}:8080/tcp"

  prometheus:
    image: prom/prometheus:${PROMETHEUS_TAG:-v2.53.1}
    container_name: coins-chain-prometheus
    restart: unless-stopped
    command:
      [
        "--config.file=/etc/prometheus/prometheus.yml",
        "--storage.tsdb.path=/prometheus",
        "--web.listen-address=0.0.0.0:9090",
      ]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_BIND:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090/tcp"

  grafana:
    image: grafana/grafana:${GRAFANA_TAG:-11.1.3}
    container_name: coins-chain-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_BIND:-127.0.0.1}:${GRAFANA_PORT:-3000}:3000/tcp"

volumes:
  prometheus-data:
  grafana-data:
