services:
  coins-chain-indexer:
    image: ${COINS_INDEXER_IMAGE:-nunchi-coins-indexer:latest}
    container_name: coins-chain-indexer
    profiles: ["indexer"]
    restart: unless-stopped
    command:
      [
        "--port",
        "8080",
        "--identity",
        "${INDEXER_IDENTITY:-}",
        "--participants",
        "${INDEXER_PARTICIPANTS:-1}",
      ]
    ports:
      - "${INDEXER_BIND:-127.0.0.1}:${INDEXER_PORT:-8080}:8080/tcp"

  coins-chain-node:
    image: ${COINS_CHAIN_IMAGE:-nunchi-coins-chain:latest}
    container_name: coins-chain-node
    restart: unless-stopped
    command: ["--config", "/etc/nunchi/coins-chain/validator.toml"]
    volumes:
      - ./validator.toml:/etc/nunchi/coins-chain/validator.toml:ro
      - ./data:/var/lib/nunchi/coins-chain
    ports:
      - "${P2P_PORT:-30000}:${P2P_PORT:-30000}/tcp"
      - "${P2P_PORT:-30000}:${P2P_PORT:-30000}/udp"
      - "${RPC_BIND:-127.0.0.1}:${RPC_PORT:-8545}:${RPC_PORT:-8545}/tcp"
      - "${METRICS_BIND:-127.0.0.1}:${METRICS_PORT:-9090}:${METRICS_PORT:-9090}/tcp"
