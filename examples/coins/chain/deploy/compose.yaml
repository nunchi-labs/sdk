services:
  coins-chain-indexer:
    image: ${COINS_INDEXER_IMAGE:-nunchi-coins-indexer:latest}
    container_name: coins-chain-indexer
    profiles: ["indexer"]
    restart: unless-stopped
    command:
      [
        "--port",
        "8080",
        "--identity",
        "${INDEXER_IDENTITY:-}",
        "--participants",
        "${INDEXER_PARTICIPANTS:-1}",
        "--frontend-dir",
        "/usr/share/nunchi/coins/frontend",
      ]
    volumes:
      - ../../frontend/dist:/usr/share/nunchi/coins/frontend:ro
    ports:
      - "${INDEXER_BIND:-127.0.0.1}:${INDEXER_PORT:-8080}:8080/tcp"

  coins-chain-node:
    image: ${COINS_CHAIN_IMAGE:-nunchi-coins-chain:latest}
    container_name: coins-chain-node
    restart: unless-stopped
    command: ["--config", "/etc/nunchi/coins-chain/validator.toml"]
    volumes:
      - ./validator.toml:/etc/nunchi/coins-chain/validator.toml:ro
      - ./data:/var/lib/nunchi/coins-chain
    ports:
      - "${P2P_PORT:-30000}:${P2P_PORT:-30000}/tcp"
      - "${P2P_PORT:-30000}:${P2P_PORT:-30000}/udp"
      - "${RPC_BIND:-127.0.0.1}:${RPC_PORT:-8545}:${RPC_PORT:-8545}/tcp"
      - "${METRICS_BIND:-127.0.0.1}:${METRICS_PORT:-9090}:${METRICS_PORT:-9090}/tcp"

  node-exporter:
    image: prom/node-exporter:${NODE_EXPORTER_TAG:-v1.8.2}
    container_name: node-exporter
    restart: unless-stopped
    command:
      [
        "--path.procfs=/host/proc",
        "--path.sysfs=/host/sys",
        "--path.rootfs=/host/root",
        "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)",
        "--web.listen-address=0.0.0.0:9100",
      ]
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    ports:
      - "${NODE_EXPORTER_BIND:-127.0.0.1}:${NODE_EXPORTER_PORT:-9100}:9100/tcp"
